name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# On annule les runs en cours sur la même branche quand un nouveau push arrive.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-build:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Build (next build)
        run: npm run build
        # Les variables Supabase sont fournies factices : le build Next n'a pas
        # besoin d'un backend joignable, seulement d'URLs valides pour que les
        # modules @supabase/ssr s'initialisent sans jeter.
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://build-placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: build-placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: build-placeholder-service-role-key
