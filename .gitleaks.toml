# Configuration gitleaks — extension des règles par défaut.
# Doc : https://github.com/gitleaks/gitleaks#configuration

[extend]
useDefault = true

# -----------------------------------------------------------------------------
# [allowlist] global (top-level, singulier) — appliqué à TOUTES les findings.
#
# Notre problème : les fichiers de définition de champs KYC contiennent des
# identifiants métier français (impot_revenu_n1, patrimoine_foncier…) que la
# règle generic-api-key attrape parce qu'ils ressemblent à `key: 'xxx'` avec
# assez d'entropie. Ce sont des champs métier, pas des clés API.
#
# Deux mécanismes de secours (OR dans un allowlist single) :
#   - paths  : exclut les fichiers KYC du scan generic-api-key
#   - stopwords : ignore toute finding dont le secret contient ces substrings
# Un vrai secret API ailleurs dans le repo reste détecté normalement.
# -----------------------------------------------------------------------------
[allowlist]
description = "Fichiers de champs KYC + stopwords métier français"
paths = [
  '''src/app/kyc/\[token\]/kyc-public-client\.tsx''',
  '''src/app/kyc/.*\.tsx''',
  '''src/components/kyc/.*\.tsx''',
]
stopwords = [
  "impot_revenu",
  "patrimoine_foncier",
  "patrimoine_financier",
  "patrimoine_professionnel",
]

# -----------------------------------------------------------------------------
# [[allowlists]] (array) — exceptions supplémentaires scopées.
# -----------------------------------------------------------------------------

[[allowlists]]
description = "Placeholders de build utilisés en CI (ni tokens ni clés réelles)"
regexes = [
  '''build-placeholder-[a-z-]+''',
  '''https://build-placeholder\.supabase\.co''',
]
paths = [
  '''\.github/workflows/.*\.ya?ml''',
]

[[allowlists]]
description = "URLs publiques de documentation et exemples"
regexes = [
  # DSN Sentry d'exemple (format documenté)
  '''https://xxx@o[0-9]+\.ingest\.sentry\.io/[0-9]+''',
  # Tokens GHA bidons dans la doc
  '''ghp_xxx+''',
]
paths = [
  '''docs/.*\.md''',
  '''\.github/workflows/.*\.ya?ml''',
  '''README\.md''',
]
