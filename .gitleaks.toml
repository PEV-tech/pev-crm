# Configuration gitleaks — extension des règles par défaut.
# Doc : https://github.com/gitleaks/gitleaks#configuration

[extend]
useDefault = true

# -----------------------------------------------------------------------------
# Allowlists — exceptions légitimes qu'on ne veut pas faire échouer la CI.
# Ajouter ici UNIQUEMENT des chaînes qui ne sont manifestement pas des secrets
# (placeholders de build, chaînes d'exemple dans la doc, noms de variables).
# Jamais ajouter un vrai secret ici.
# -----------------------------------------------------------------------------

[[allowlists]]
description = "Placeholders de build utilisés en CI (ni tokens ni clés réelles)"
regexes = [
  '''build-placeholder-[a-z-]+''',
  '''https://build-placeholder\.supabase\.co''',
]
paths = [
  '''\.github/workflows/.*\.ya?ml''',
]

[[allowlists]]
description = "URLs publiques de documentation et exemples"
regexes = [
  # DSN Sentry d'exemple (format documenté)
  '''https://xxx@o[0-9]+\.ingest\.sentry\.io/[0-9]+''',
  # Tokens GHA bidons dans la doc
  '''ghp_xxx+''',
]
paths = [
  '''docs/.*\.md''',
  '''\.github/workflows/.*\.ya?ml''',
  '''README\.md''',
]

[[allowlists]]
description = "Faux positifs generic-api-key sur identifiants métier KYC (français)"
# Les field keys comme `impot_revenu_n1`, `impot_revenu_n2`, `patrimoine_foncier`
# déclenchent la règle generic-api-key parce qu'ils ressemblent à
# `key: 'xxx'` avec assez d'entropie. Ce sont des identifiants métier
# KYC/finance, pas des clés API.
#
# Approche : regex ciblée sur le pattern `key: '<identifiant_métier>'`,
# scopé aux fichiers KYC uniquement. regexTarget = "match" fait porter
# la regex sur le texte détecté par la règle (pas juste le secret
# extrait), ce qui laisse un vrai secret API dans le même fichier
# toujours détectable.
regexTarget = "match"
regexes = [
  '''key:\s*['"](impot_revenu_n[0-9]*|patrimoine_[a-z0-9_]+|detention_[a-z0-9_]+|acquisition_[a-z0-9_]+|emprunteur_[a-z0-9_]+|conjoint_[a-z0-9_]+|titulaire_[a-z0-9_]+|beneficiaire_[a-z0-9_]+)['"]''',
]
paths = [
  '''src/app/kyc/.*\.tsx?''',
  '''src/components/kyc/.*\.tsx?''',
]
